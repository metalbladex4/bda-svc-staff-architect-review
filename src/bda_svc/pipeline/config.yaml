# ------------------------------------------------------------
# DETECTION VLM BACKEND
# ------------------------------------------------------------
detection_vlm:
  model: qwen3-vl:8b-instruct-q8_0  # str, required; Ollama model name.
  temperature: 0.0  # float, required; Sampling temperature for generation.
  max_image_size: 1024  # int, required; Maximum input image width or height before downsizing.
  crop_buffer_ratio: 0.2  # float, required; Padding ratio applied around each detection box when creating crops.

# ------------------------------------------------------------
# ASSESSMENT VLM BACKEND
# ------------------------------------------------------------
assessment_vlm:
  model: qwen3-vl:8b-instruct-q8_0  # str, required; Ollama model name.
  temperature: 0.0  # float, required; Sampling temperature for generation.
  max_image_size: 1024  # int, required; Maximum input image width or height before downsizing.

# ------------------------------------------------------------
# PROMPT TEMPLATES
# ------------------------------------------------------------
prompts:
  system: |  # str, required; Shared system prompt used for all VLM calls.
    You are a military strike assessment analyst performing a STRICT visual-only assessment.

    CORE PRINCIPLES
    - Base conclusions ONLY on visible evidence in the images.
    - Do not hallucinate or infer unseen damage.
    - Be conservative, precise, and evidence-based.
    - Use doctrinal definitions when provided.
    - Follow output instructions and schema exactly.

  detect_objects: |  # str, required; Object detection prompt.
    Perform a VISUAL-ONLY object detection.

    TASK
    Detect every visible target whose doctrinal target_type is one of:
    {categories}

    THINKING PROCESS (follow internally, do NOT output these steps)
    1) First, carefully identify and count all distinct target objects in the scene.
    2) Assign each object a unique internal ID.
    3) Then, for each identified object, determine its target_type.
    4) Finally, produce one precise bounding box per object.

    RULES
    - Detect each separate physical object individually.
    - Do NOT merge multiple objects into one.
    - Do NOT split one object into multiple detections.
    - Include partially visible objects if identifiable.
    - Only include objects whose identity can be determined from visible features.
    - Do NOT include objects outside the allowed categories.

    CONSISTENCY REQUIREMENTS
    - The number of detections must match the number of distinct objects identified.
    - Each object must have exactly one bounding box.
    - No duplicate detections.

    BOUNDING BOX FORMAT
    - Use a 0–1000 coordinate system.
    - Format: [xmin, ymin, xmax, ymax]
    - Values must be integers between 0 and 1000.
    - xmin < xmax and ymin < ymax.
    - Boxes should tightly enclose the visible extent of the object.

    OUTPUT
    Return valid JSON only.
    Return a JSON object with a top-level detections field.

    OUTPUT SCHEMA
    {
      "detections": [
        {
          "target_type": string,
          "bbox": [xmin, ymin, xmax, ymax]
        }
      ]
    }

  assess_damage: | # str, required; Per-target damage assessment prompt.
    Perform a STRICT VISUAL-ONLY damage assessment for ONE target object.

    INPUT ROLES
    - Two visual inputs are provided:
      1) scene context image with the selected target highlighted by an outline
      2) cropped image of the selected target
    - Assess damage only for the selected target object.
    - Use scene context only to resolve ambiguity.

    TARGET TYPE
    {target_type}

    DOCTRINAL DEFINITIONS
    {doctrine}

    RULES
    - Focus only on the selected target object.
    - Do not reference crops, prompts, or analysis steps in the output.
    - Set logic to short factual observations only, using concise phrases separated by semicolons. Include only specific visible, doctrinally relevant evidence.

    CONFIDENCE GUIDANCE
    Avoid overconfidence. High confidence should be used sparingly and only when visual evidence is clear and unmistakable.
    Incorrect high-confidence assessments are penalized more heavily than low-confidence ones.
    Always select the lowest confidence level consistent with the visible evidence.
    - confirmed — clear, direct, unambiguous visual evidence with no reasonable alternative interpretation.
    - probable — visible indicators suggesting the damage category, but evidence is incomplete, partially obscured, or ambiguous.
    - possible — weak, limited, or uncertain indicators; damage category cannot be determined definitively.

    OUTPUT
    Return valid JSON only. No preamble, no explanation.

    ASSESSMENT SCHEMA
    {
      "damage_category": string,
      "confidence_level": string,
      "brief_supporting_logic": string
    }

  summarize_scene: |  # str, required; Scene summary prompt.
    Perform a STRICT VISUAL-ONLY scene summary.

    INPUTS
    - One full-scene image is provided.
    - Prior individual target assessments are provided below.
    - The summary must remain consistent with those prior assessments.

    PRIOR TARGET ASSESSMENTS
    {target_assessments}

    SUMMARY GOAL
    Write a short (1-3 sentences) scene-level report in plain text.
    The report should:
    - first enumerate what is in the prior target assessments, example: "4 pieces of military equipment (2 destroyed tanks, 2 damaged tanks), 1 damaged building."
    - then summarize the overall scene as a whole based on the full-scene image
    - then state the likely follow-on functional impact / combat capability

    OUTPUT
    Return plain text only. No new lines.
    If no relevant targets were assessed, briefly describe the scene and state that no relevant targets were assessed in the scene.
