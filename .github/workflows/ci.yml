name: CI Pipeline

# Trigger the workflow on:
# 1. Pushes to any branch (know if it breaks before you even open a PR)
# 2. Pull Requests targeting main
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Set up Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # 3. Set up uv
    - name: Set up uv
      uses: astral-sh/setup-uv@v8.0.0

    # 4. Install dependencies
    - name: Install dependencies
      run: uv sync

    # 5. Run Tests
    - name: Run Tests
      run: uv run pytest -v


  build-run-scan:
    needs: test
    runs-on: ubuntu-24.04-arm
    env:
      BDA_DETECTION_MODEL: qwen3-vl:2b-instruct
      BDA_ASSESSMENT_MODEL: qwen3-vl:2b-instruct

    steps:
    # 1. Check out the code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Ollama
    - name: Setup Ollama
      uses: ai-action/setup-ollama@v2
      with:
        ollama-version: "latest"

    - name: Pull VLMs
      run: |
        ollama pull "$BDA_DETECTION_MODEL"
        ollama pull "$BDA_ASSESSMENT_MODEL"

    # 3. Get test data
    - name: Prepare test inputs
      run: |
        mkdir -p ./bda_input ./bda_output
        cp ./tests/data/tank.jpg ./bda_input

    # 4. Build Docker image
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build image
      uses: docker/build-push-action@v5
      with:
        platforms: linux/arm64
        context: .
        file: ./docker/Dockerfile
        tags: bda-svc:latest
        load: true

    # 5. Run bda-svc on ARM container
    - name: Run containerized test
      run: |
        docker run --rm --network host \
          -e BDA_DETECTION_MODEL="$BDA_DETECTION_MODEL" \
          -e BDA_ASSESSMENT_MODEL="$BDA_ASSESSMENT_MODEL" \
          -v "$(pwd)/bda_input:/bda_input" \
          -v "$(pwd)/bda_output:/bda_output" \
          bda-svc:latest -i /bda_input -o /bda_output

    # 6. Print generated bda-report
    - name: Print bda-report
      run: |
        for file in ./bda_output/*.json; do
          echo "=== $file ==="
          python -m json.tool "$file"
          echo
        done


    # 7. Start fake Ollama server on a non-default port
    - name: Start fake Ollama server
      run: |
        cat > fake_ollama.py <<'PY'
        from http.server import BaseHTTPRequestHandler, HTTPServer
        import json

        class Handler(BaseHTTPRequestHandler):
            def do_POST(self):
                if self.path != "/api/chat":
                    self.send_response(404)
                    self.end_headers()
                    return

                length = int(self.headers.get("Content-Length", 0))
                body = self.rfile.read(length)
                data = json.loads(body.decode("utf-8"))

                with open("fake_ollama_request.json", "w") as f:
                    json.dump(data, f)

                response = {
                    "model": data.get("model", "unknown"),
                    "created_at": "2026-01-01T00:00:00Z",
                    "message": {
                        "role": "assistant",
                        "content": "fake response"
                    },
                    "done": True
                }

                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.end_headers()
                self.wfile.write(json.dumps(response).encode("utf-8"))

        HTTPServer(("0.0.0.0", 12345), Handler).serve_forever()
        PY
        nohup python3 fake_ollama.py >/tmp/fake_ollama.log 2>&1 &
        sleep 2

    # 6. Run container against fake Ollama to verify OLLAMA_HOST override
    - name: Run host override integration test
      run: |
        docker run --rm --network host \
          -e OLLAMA_HOST=http://localhost:12345 \
          -e BDA_DETECTION_MODEL="$BDA_DETECTION_MODEL" \
          -e BDA_ASSESSMENT_MODEL="$BDA_ASSESSMENT_MODEL" \
          -v "$(pwd)/bda_input:/bda_input" \
          -v "$(pwd)/bda_output:/bda_output" \
          bda-svc:latest -i /bda_input -o /bda_output

    # 7. Verify fake Ollama server was actually used
    - name: Verify fake Ollama request
      run: |
        test -f fake_ollama_request.json
        echo "=== fake_ollama_request.json ==="
        python - <<'PY'
        import json

        with open("fake_ollama_request.json") as f:
            data = json.load(f)

        summary = {
            "model": data.get("model"),
            "stream": data.get("stream"),
            "options": data.get("options"),
            "message_count": len(data.get("messages", [])),
            "roles": [m.get("role") for m in data.get("messages", [])],
            "image_count_in_last_message": len(data.get("messages", [{}])[-1].get("images", [])) if data.get("messages") else 0,
            "user_content_preview": data.get("messages", [{}])[-1].get("content", "")[:200],
        }

        print(json.dumps(summary, indent=2))
        PY

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'bda-svc:latest'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

  push_to_registry:
    needs: build-run-scan
    runs-on: ubuntu-latest
    steps:

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

