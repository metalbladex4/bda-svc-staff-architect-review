name: CI Pipeline

# Trigger the workflow on:
# 1. Pushes to any branch (know if it breaks before you even open a PR)
# 2. Pull Requests targeting main
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Set up Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # 3. Set up uv
    - name: Set up uv
      uses: astral-sh/setup-uv@v8.0.0

    # 4. Install dependencies
    - name: Install dependencies
      run: uv sync

    # 5. Run Tests
    - name: Run Tests
      run: uv run pytest -v


  build-and-run:
    needs: test
    runs-on: ubuntu-24.04-arm
    env:
      BDA_DETECTION_MODEL: qwen3-vl:2b-instruct
      BDA_ASSESSMENT_MODEL: qwen3-vl:2b-instruct

    steps:
    # 1. Check out the code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Ollama
    - name: Setup Ollama
      uses: ai-action/setup-ollama@v2
      with:
        ollama-version: "latest"

    - name: Pull VLMs
      run: |
        ollama pull "$BDA_DETECTION_MODEL"
        ollama pull "$BDA_ASSESSMENT_MODEL"

    # 3. Get test data
    - name: Prepare test inputs
      run: |
        mkdir -p ./bda_input ./bda_output
        cp ./tests/data/tank.jpg ./bda_input

    # 4. Build Docker image
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build image
      uses: docker/build-push-action@v5
      with:
        platforms: linux/arm64
        context: .
        file: ./docker/Dockerfile
        tags: bda-svc:latest
        load: true

    # 5. Run bda-svc on ARM container
    - name: Run containerized test
      run: |
        docker run --rm --network host \
          -e BDA_DETECTION_MODEL="$BDA_DETECTION_MODEL" \
          -e BDA_ASSESSMENT_MODEL="$BDA_ASSESSMENT_MODEL" \
          -v "$(pwd)/bda_input:/bda_input" \
          -v "$(pwd)/bda_output:/bda_output" \
          bda-svc:latest -i /bda_input -o /bda_output

    # 6. Print generated bda-report
    - name: Print bda-report
      run: |
        for file in ./bda_output/*.json; do
          echo "=== $file ==="
          python -m json.tool "$file"
          echo
        done

    # 7. Scan container for vulnerabilities
  scan:
    needs: build-and-run
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v5
        with:
          platforms: linux/arm64
          context: .
          file: ./docker/Dockerfile
          tags: bda-svc:latest
          load: true
      - uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: bda-svc:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

  publish:
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v5
        with:
          platforms: linux/arm64
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
