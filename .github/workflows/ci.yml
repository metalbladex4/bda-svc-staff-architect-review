name: CI Pipeline

# Trigger the workflow on:
# 1. Pushes to any branch (know if it breaks before you even open a PR)
# 2. Pull Requests targeting main
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]


# ----------------------------------------------------------------------
# Job 1 — Unit tests
# ----------------------------------------------------------------------
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v --cov=bda_svc --cov-report=term-missing


# ----------------------------------------------------------------------
# Job 2 — Build image, run integration test
# ----------------------------------------------------------------------
  build-and-run:
    needs: test
    runs-on: ubuntu-24.04-arm
    env:
      BDA_DETECTION_MODEL: qwen3-vl:2b-instruct
      BDA_ASSESSMENT_MODEL: qwen3-vl:2b-instruct

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2
        with:
          ollama-version: "latest"

      - name: Pull VLMs
        run: |
          ollama pull "$BDA_DETECTION_MODEL"
          ollama pull "$BDA_ASSESSMENT_MODEL"

      - name: Prepare test inputs
        run: |
          mkdir -p ./bda_input ./bda_output
          cp ./tests/data/tank.jpg ./bda_input

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          platforms: linux/arm64
          context: .
          file: ./docker/Dockerfile
          tags: bda-svc:latest
          load: true

      - name: Run containerized test
        run: |
          docker run --rm --network host \
            -e BDA_DETECTION_MODEL="$BDA_DETECTION_MODEL" \
            -e BDA_ASSESSMENT_MODEL="$BDA_ASSESSMENT_MODEL" \
            -v "$(pwd)/bda_input:/bda_input" \
            -v "$(pwd)/bda_output:/bda_output" \
            bda-svc:latest -i /bda_input -o /bda_output

      - name: Print bda-report
        run: |
          for file in ./bda_output/*.json; do
            echo "=== $file ==="
            python -m json.tool "$file"
            echo
          done


# ----------------------------------------------------------------------
# Job 3 — Scan image for vulnerabilities
# ----------------------------------------------------------------------
  scan:
    needs: build-and-run
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          platforms: linux/arm64
          context: .
          file: ./docker/Dockerfile
          tags: bda-svc:latest
          load: true

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: bda-svc:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH


# ----------------------------------------------------------------------
# Job 4 — Build and publish image to GHCR (main branch only)
# ----------------------------------------------------------------------
  publish:
    needs: scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          platforms: linux/arm64
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest


# ----------------------------------------------------------------------
# Job 5 — Pipeline summary
# ----------------------------------------------------------------------
  summary:
    needs: [test, build-and-run, scan, publish]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Add final pipeline summary
        run: |
          echo "# Autonomous BDA CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "- Test: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build and Run: ${{ needs.build-and-run.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan (informational): ${{ needs.scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Publish Status: ${{ needs.publish.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.publish.result }}" == "success" ]; then
            echo "## Published Artifact" >> $GITHUB_STEP_SUMMARY
            echo "- Image: ghcr.io/${{ github.repository }}:latest" >> $GITHUB_STEP_SUMMARY
            echo "- Platform: linux/arm64" >> $GITHUB_STEP_SUMMARY
          fi
