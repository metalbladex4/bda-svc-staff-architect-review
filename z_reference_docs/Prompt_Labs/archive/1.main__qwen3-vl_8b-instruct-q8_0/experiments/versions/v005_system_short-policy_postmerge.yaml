  Re-applies the v001 short policy-only system prompt on top of the refreshed
  current-main baseline. No task prompt placeholders, schemas, or bbox contract
  assumptions are changed.
intended_effect:
  - improve format compliance
  - reduce reasoning-trace leakage
  - keep visual-only reasoning consistent across all prompt surfaces
  - reduce competition between system and task prompts
