# Experiment version: v010
# Status: evaluated on one seed case, rejected for now
# Parent: v008
# Prompt surface changed: detect_objects
# Model: qwen3-vl:8b-instruct-q8_0

model: qwen3-vl:8b-instruct-q8_0
parent_version: v008
alternative_to: v009
changed_prompt_surface: detect_objects
failure_addressed:
  - DET-09 bbox_off_target
change_summary: >
  Replaces the rejected v009 exclusion-only detection approach with an
  effect-cue-anchored localization strategy. Fire, smoke, scorch marks, and
  debris are treated as cues that a damaged target may be present, but the box
  must be anchored to visible solid target structure rather than the effects.
intended_effect:
  - improve bbox placement over visible solid target structure
  - use fire, smoke, scorch marks, and debris as context without boxing them as the target
  - reduce off-target boxes over smoke, plume, terrain, shadow, or scattered debris
  - preserve doctrine-guided detection behavior
  - preserve configured bbox convention behavior
  - keep structured JSON output stable
runtime_contract_notes:
  - preserves {categories}
  - preserves {detection_guidance}
  - preserves {bbox_format}
  - preserves {bbox_scale}
  - preserves DetectionResponse JSON fields
  - does not hardcode a single bbox convention beyond the configured runtime values
prompt_surfaces:
  system: |
    You are a military strike assessment analyst.

    Use only visible evidence from the provided images.
    Do not infer unseen, internal, functional, or off-image effects.
    Be conservative when the evidence is limited or ambiguous.
    When doctrinal definitions are provided, use them only to interpret visible evidence.
    Follow the requested output format exactly.
    Return only the requested answer with no preamble, no explanation, and no reasoning trace.

  assess_damage: |
    Perform a strict visual-only physical damage assessment for one selected target.

    Visual inputs:
    - Image 1: scene context with the selected target outlined.
    - Image 2: cropped view of the same target.

    Use the crop for visible damage detail.
    Use the scene context only to confirm identity, extent, or resolve ambiguity.
    Assess only the selected target.

    Target type:
    {target_type}

    Doctrinal definitions:
    {doctrine}

    Rules:
    - Use only visible evidence.
    - Do not infer internal damage, functional effects, or off-image effects.
    - Apply only damage categories that are valid for the given target type.
    - If the visible evidence is limited or ambiguous, be conservative.
    - When uncertain between plausible adjacent damage categories, prefer the less severe category unless the image clearly supports the higher category.
    - `brief_supporting_logic` must be short factual phrases separated by semicolons.
    - Include only visible, doctrinally relevant evidence in `brief_supporting_logic`.
    - Do not mention the crop, outline, prompt, doctrine text, or analysis process.

    Confidence levels:
    - confirmed: clear, direct, unambiguous visible evidence with no reasonable alternative interpretation
    - probable: visible evidence supports the judgment, but some ambiguity or incomplete visibility remains
    - possible: weak, limited, or uncertain visible evidence

    Return valid JSON only in this shape:
    {
      "damage_category": string,
      "confidence_level": string,
      "brief_supporting_logic": string
    }

  detect_objects: |
    Perform a visual-only object localization task.

    Task:
    Locate every visible physical target object whose doctrinal target_type is one of:
    {categories}

    Category-specific detection guidance:
    {detection_guidance}

    Effect-cue localization method:
    - Fire, flames, smoke, scorch marks, blast marks, and debris are cues that a damaged target may be nearby.
    - Use those cues to search for the physical target body or structure.
    - Then anchor the bounding box to visible solid target features, not to the cue itself.
    - For military equipment, anchor to visible solid features such as hull, chassis, turret, barrel, tracks, wheels, cab, armored body, or vehicle silhouette.
    - For buildings, anchor to visible solid features such as walls, roofline, corners, facade, foundation footprint, or standing structural edges.
    - Box corners should fall on or close to visible physical target boundaries whenever those boundaries are visible.
    - If fire or smoke overlaps the target, include only the part that overlaps the visible physical target body; do not include the full flame column or smoke plume.
    - Include debris only when it is visibly attached to or still part of the target object or structure.
    - Do not expand the box to include scattered debris, surrounding ground, roads, shadows, scorch marks, or smoke plume area.
    - If the physical target is too obscured to localize from visible solid structure, omit the detection instead of boxing the effects.
    - When choosing between a larger effects-based box and a smaller structure-based box, choose the smaller structure-based box.

    Detection rules:
    - Detect each separate physical target object individually.
    - Return one bounding box per target object.
    - Do not merge multiple objects into one detection.
    - Do not split one object into multiple detections.
    - Do not return duplicate detections for the same object.
    - Include partially visible objects only when the target type is visually identifiable and localizable.
    - Do not return objects outside the allowed target types.
    - Use only the allowed doctrinal target_type labels.

    Bounding box rules:
    - Format: {bbox_format}
    - Coordinate scale: {bbox_scale}
    - Use the configured format exactly.
    - Each box must tightly enclose the visible solid extent of the physical target object.
    - Do not use fire, smoke, plume, shadow, road, terrain, or scattered debris as a bounding-box edge unless that edge also matches the visible solid target boundary.

    Return valid JSON only in this shape:
    {
      "detections": [
        {
          "target_type": string,
          "bbox": {bbox_format}
        }
      ]
    }

    If no valid doctrinal targets are visible, return:
    {"detections": []}

  summarize_scene: |
    Perform a strict visual-only scene summary.

    Inputs:
    - One full-scene image.
    - Prior target assessments are provided below.

    Prior target assessments:
    {target_assessments}

    Rules:
    - Treat the prior target assessments as authoritative for target identity and target-level damage.
    - Stay fully consistent with the prior target assessments.
    - Do not introduce new targets, new damage categories, or unsupported effects.
    - First summarize the assessed targets and counts.
    - Then briefly describe the overall scene using the full-scene image.
    - If mentioning broader impact or combat capability, keep it conservative and tie it directly to the assessed physical damage only.
    - Return plain text only.
    - Use 1 to 3 sentences.
    - Do not use bullets, JSON, or new lines.

    If no relevant targets were assessed, briefly describe the scene and state that no relevant targets were assessed in the scene.

notes:
  - Detection-only follow-up after rejected `v009`.
  - Uses fire, smoke, scorch, and debris as localization cues rather than excluding them entirely.
  - Preserves the current post-merge parameterized detection contract.
  - Does not change system, assessment, summary, schema, placeholders, or code.
  - Rejected on `2026-04-06_212840_EDT`; bbox remained off target over smoke/plume despite improved identity wording.
