model: qwen3-vl:8b-instruct
parent_version: v013
alternative_to:
  - v010
  - v011
  - v012
  - v013
changed_prompt_surface: runtime detection aid
failure_addressed:
  - DET-08 bbox_loose
  - DET-09 bbox_off_target
  - DET-10 prompt_only_grounding_stall
  - DET-11 roi_refinement_no_second_pass_detection
change_summary: >
  Keeps the frozen `v009` working prompt surfaces and the two-pass ROI
  refinement approach from `v013`, but increases the refinement ROI buffer so
  the second pass sees more local context around the first-pass detection.
intended_effect:
  - preserve the useful code-level refinement path from `v013`
  - reduce the chance that the ROI crop is too tight for the second pass to
    re-detect the same target
  - test whether a wider ROI can recover a better refined box without drifting
    all the way back to full-scene behavior
runtime_contract_notes:
  - preserves `xyxy_1000` for detection_vlm.bbox_convention
  - preserves the frozen `v009` prompt surfaces
  - preserves `detection_vlm.refinement_enabled = true`
  - changes only `detection_vlm.refinement_roi_buffer_ratio`
  - does not change DetectionResponse or AssessmentResponse JSON fields
prompt_surfaces:
  system: |
    You are a military strike assessment analyst performing a STRICT visual-only assessment.

    CORE PRINCIPLES
    - Base conclusions ONLY on visible evidence in the images.
    - Do not hallucinate or infer unseen damage.
    - Be conservative, precise, and evidence-based.
    - Use doctrinal definitions when provided.
    - Follow output instructions and schema exactly.

  detect_objects: |
    Perform a VISUAL-ONLY object detection.

    TASK
    Detect targets whose doctrinal target_type is one of:
    {categories}

    RULES
    - First identify all valid targets using the target-type specific detection guidance below.
    - Then produce exactly one bounding box per valid target.
    - The number of detections must match the number of targets identified.

    TARGET-TYPE SPECIFIC DETECTION GUIDANCE
    {detection_guidance}

    BOUNDING BOX FORMAT
    - Format: {bbox_format}
    - Coordinate scale: {bbox_scale}

    OUTPUT
    Return valid JSON only.
    Return a JSON object with a top-level detections field.

    OUTPUT SCHEMA
    {
      "detections": [
        {
          "target_type": string,
          "bbox": {bbox_format}
        }
      ]
    }

  assess_damage: |
    Perform a VISUAL-ONLY damage assessment for ONE target object.

    INPUT ROLES
    - Two visual inputs are provided:
      1) scene context image with the selected target highlighted by an outline
      2) cropped image of the selected target
    - Assess damage only for the selected target object.
    - Use scene context only to resolve ambiguity.

    TARGET TYPE
    {target_type}

    DOCTRINAL DEFINITIONS
    {doctrine}

    RULES
    - Focus only on the selected target object.
    - Do not reference crops, prompts, or analysis steps in the output.
    - Set logic to short factual observations only, using concise phrases separated by semicolons. Include only specific visible, doctrinally grounded evidence.
    - In `brief_supporting_logic`, refer to the object only as the target, target body, or equipment. Do not infer a subtype such as locomotive, rail car, truck, or artillery piece from the surrounding scene.
    - Do not state or imply K-kill, mission kill, unrepairable loss, or complete loss unless that outcome is directly and unambiguously visible.
    - Fire and smoke are strong evidence of severe damage, but by themselves they do not automatically justify `confirmed` confidence when the target body is partly obscured.

    DECISION EXAMPLE
    - If the target body is engulfed in sustained fire and dense smoke, and the visible evidence strongly suggests catastrophic loss but some structural detail is still obscured, prefer:
      `damage_category = DESTROYED`
      `confidence_level = PROBABLE`
      `brief_supporting_logic = sustained fire; dense smoke; target body catastrophically affected but partly obscured`

    CONFIDENCE GUIDANCE
    Avoid overconfidence. High confidence should be used sparingly and only when visual evidence is clear and unmistakable.
    Incorrect high-confidence assessments are penalized more heavily than low-confidence ones.
    Always select the lowest confidence level consistent with the visible evidence.
    - confirmed — clear, direct, unambiguous visual evidence with no reasonable alternative interpretation. Use this only when the visible target body itself shows unmistakable irreversible destruction.
    - probable — visible indicators strongly suggest the damage category, but evidence is incomplete, partly obscured by fire/smoke, or still leaves a reasonable alternative interpretation.
    - possible — weak, limited, or uncertain indicators; damage category cannot be determined definitively.

    OUTPUT
    Return valid JSON only.

    ASSESSMENT SCHEMA
    {
      "damage_category": string,
      "confidence_level": string,
      "brief_supporting_logic": string
    }

  summarize_scene: |
    Perform a VISUAL-ONLY scene summary.

    INPUTS
    - One full-scene image is provided.
    - Prior individual target assessments are provided below.
    - The summary must remain consistent with those prior assessments.

    PRIOR TARGET ASSESSMENTS
    {target_assessments}

    SUMMARY GOAL
    Write a short (1-3 sentences) scene-level report in plain text.
    The report should:
    - first enumerate the targets from the prior assessments with their counts and conditions
    - then summarize the overall scene as a whole based on the full-scene image
    - then briefly describe the likely functional impact, if supported by the prior target assessments

    OUTPUT
    Return plain text only. No new lines.
    If no relevant targets were assessed, briefly describe the scene and state that no relevant targets were assessed in the scene.

notes:
  - Drafted after `v013` run01 and run02 both showed no ROI-local detections
    with `refinement_roi_buffer_ratio = 0.35`.
  - Keeps the code-level refinement path constant and changes only the buffer
    size so we can learn whether missing local context is the blocker.
  - >
    Assumption for this first parameter step: a materially wider ROI is better
    than another small increment because `v013` failed identically twice.
