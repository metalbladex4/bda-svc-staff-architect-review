change_summary: >
  Returns to the stronger `v007` assessment baseline and replaces the failed
  `v008` abstract category guidance with one direct example. The new prompt
  shows the desired `DESTROYED` + `PROBABLE` pattern for a sustained burn case
  and explicitly bans subtype wording in `brief_supporting_logic`.
intended_effect:
  - restore `DESTROYED` without returning to `CONFIRMED`
  - keep anti-K-kill and anti-unrepairable protections
  - remove subtype drift from target-level logic
  - provide cleaner inputs to the unchanged summary stage
