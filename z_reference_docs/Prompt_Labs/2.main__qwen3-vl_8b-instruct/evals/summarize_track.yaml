track: summarize
model: qwen3-vl:8b-instruct
prompt_surfaces:
  - system
  - summarize_scene
purpose: >
  Evaluate scene summaries against frozen target-assessment payloads so summary
  prompt quality is not contaminated by detector or assessment failures.
pass_requirements:
  - plain_text_only
  - consistent_with_prior_assessments
  - no_new_targets
  - concise_readable_output
cases:
  - case_id: summary_seed_single_destroyed_equipment_01
    status: ready
    scene_image: tests/data/tank.jpg
    target_assessments:
      - target_type: military_equipment
        damage_category: DESTROYED
        confidence_level: PROBABLE
        brief_supporting_logic: visible fire; thick smoke; compromised structure
        bounding_box: [51, 37, 128, 73]
    expected:
      must_include: []
      must_not_include:
        - "{"
        - "target_"
        - no relevant targets were assessed
        - building
      review_checks:
        - plain_text_only
        - no_new_targets
        - consistent_with_prior_assessments
        - concise_output
    notes: >
      Current repo fixture with one destroyed piece of military equipment. The
      frozen target payload now reflects the first baseline run in this active
      lab while keeping the supporting logic generic enough for summary-only
      evaluation.
  - case_id: summary_template_with_frozen_targets_01
    status: template_add_case
    scene_image: null
    target_assessments: []
    expected:
      must_include: []
      must_not_include: []
      review_checks:
        - consistent_with_prior_assessments
        - no_new_targets
        - concise_output
    notes: Add a scene plus frozen assessments after the first accepted cases.
