overlay_id: "qwen-1.2-v015c-detect-count-first-uncertainty-gate"
overlay_type: "experiment"
model_line: "qwen3-vl:8b-instruct"
description: >
  Human-report-informed Qwen v015c detect-only candidate. This overlay
  abandons row-enumeration wording after v015a/v015b failures and tests
  a count-first, uncertainty-gated strategy for distinct visible targets.
overrides:
  prompts:
    detect_objects: |
      Perform a VISUAL-ONLY object detection.

      TASK
      Detect targets whose doctrinal target_type is one of:
      {categories}

      COUNT-FIRST DECISION
      - First make a conservative visual count of targets that are clearly separable as individual visible bodies.
      - A target counts only when its own connected target body or building structure is visible enough to draw a tight box.
      - If a possible target is just one item in a repeated row, texture, shadow pattern, debris line, road mark, smoke edge, or other ambiguous small pattern, do not count it.
      - If you cannot confidently separate individual bodies in a row-like or crowded area, count fewer targets rather than inventing a box for each fragment.
      - The final number of detections must equal this conservative count.

      UNCERTAINTY GATE
      - Uncertain row elements are not detections.
      - Ambiguous distant specks are not detections.
      - A broad group, convoy, row, building complex, or scene region is not one target.
      - Do not output a box just to explain a possible object. Output only when the target body is visually supported.

      BUILDING TARGET SELECTION
      - For buildings, count each clearly distinct exterior building body or clearly distinct collapsed exterior structural remain.
      - Do not split one continuous building, attached wing, shared facade, side wall, fire/smoke region, rubble edge, or debris field into multiple boxes.
      - Do not box smoke, flame, facade texture, shadow, debris, or adjacent context as a separate building.
      - Do not treat indoor rooms, office interiors, cubicles, partitions, furniture, interior walls, ceiling tiles, or ordinary room contents as doctrinal building targets.
      - If the image is primarily an indoor scene and no visible exterior building structure or collapsed exterior structural remains are present, do not detect a building target.

      MILITARY-EQUIPMENT TARGET SELECTION
      - For military equipment, count each clearly visible distinct equipment body.
      - Small or distant equipment may be detected only when its individual body is clear enough to box as one specific object.
      - Do not infer equipment from tracks, roads, shadows, repeated row marks, smoke, dust, muzzle flash, debris, or ambiguous background fragments.
      - Do not output a long row, convoy region, or broad group box as one equipment detection.

      RULES
      - Produce exactly one bounding box per valid counted target.
      - If two targets are visibly separate and both pass the uncertainty gate, output two boxes.
      - If separation is unclear, omit the uncertain candidate rather than adding more boxes.
      - Never merge neighboring targets into a broad group box.
      - Never inflate a box to include nearby context, smoke, fire, road, debris, or adjacent targets.
      - If no valid targets are visible, return {"detections": []}.

      TARGET-TYPE SPECIFIC DETECTION GUIDANCE
      {detection_guidance}

      BOXING RULE
      - Box the visible connected man-made body or structure of each target only.
      - Use fire, smoke, muzzle flash, or debris only to help locate the target, not to define the box boundary.
      - If smoke, flame, or dust hides part of a target, keep the box on the visible connected target body that remains.
      - On intact or operational targets, box the visible target body only when the doctrinal target itself is clearly visible. Do not widen the detection prior from scene context alone.
      - Do not box the smoke plume, flame column, muzzle flash, debris field between targets, rail bed, road, shadow, empty ground, or background context.

      OUTPUT DISCIPLINE
      - Return only the doctrinal target_type category.
      - Do not infer a finer subtype such as locomotive, train car, truck, or artillery piece.

      BOUNDING BOX FORMAT
      - Format: {bbox_format}
      - Coordinate scale: {bbox_scale}

      OUTPUT
      Return valid JSON only.
      Return a JSON object with a top-level detections field.

      OUTPUT SCHEMA
      {
        "detections": [
          {
            "target_type": string,
            "bbox": {bbox_format}
          }
        ]
      }
  runtime:
    experiment_metadata:
      candidate_id: "v015c_count_first_uncertainty_gate"
      parent_version: "v015b_distinct_object_guard"
      overlay_role: "human_report_count_first_uncertainty_gate"
      phase: "v015_human_report_hinge"
      source_strategy_package: "docs/prompt-lab/qwen-v015-human-report-strategy"
