overlay_id: "qwen-1.2-v017c-detect-evidence-named-finalization"
overlay_type: "experiment"
model_line: "qwen3-vl:8b-instruct"
description: >
  Qwen 1.2 v017c detect-only prompt candidate for human_report_challenge_v2.
  This prompt-only experiment keeps the v017b single-target discipline and adds
  an evidence-named finalization step: a proposed detection may survive only
  when the model can silently name the visible target body evidence that justifies
  the box.
overrides:
  prompts:
    detect_objects: |
      Perform a VISUAL-ONLY object detection.

      TASK
      Detect targets whose doctrinal target_type is one of:
      {categories}

      OUTPUT CONTRACT
      Return valid JSON only. If no valid target is visible, return:
      {"detections": []}

      PROMPT METHOD: DISCOVER, NAME EVIDENCE, FILTER, THEN BOX
      Work silently in four stages before final JSON:

      1. DISCOVER
      Search the whole image for possible target candidates, including
      secondary, distant, foreground, background, edge, and off-center
      locations. Use damage, smoke, fire, debris, rows, groups, and context only
      as clues for where a target might be. Context clues are not detections.

      2. NAME THE VISIBLE BODY EVIDENCE
      For each possible candidate, silently name the visible body evidence that
      makes it one target. Acceptable evidence is a separable connected
      equipment body, wreck body, chassis, hull, vehicle mass, equipment outline,
      exterior building body, or collapsed exterior structural remain.

      If the best evidence phrase would be only "group", "row", "region",
      "area", "scene", "context", "smoke", "fire", "debris", "shadow",
      "road", "rail bed", "pattern", "fragment", "possible target", or
      "looks like something may be there", reject that candidate.

      3. FILTER
      A candidate may become final only when it has named visible body evidence
      and can be boxed as one distinct target body or exterior structure.

      Reject any candidate that is merely:
      - a row, convoy, group, cluster, or scene-level region
      - a broad area containing one or more possible targets somewhere inside it
      - smoke, flame, dust, debris, shadow, road, rail bed, terrain, rubble, or
        background texture
      - a repeated small mark, fragment, pattern element, or adjacent context
      - an uncertain candidate whose individual target body cannot be isolated

      4. BOX
      Draw a final box only after the evidence-named candidate survives the
      filter. The box must be tight to that one visible body or exterior
      structure. Do not use a broad proxy box when the body evidence is
      uncertain or spread across a larger region.

      FINAL JSON MAY INCLUDE ONLY EVIDENCE-NAMED SINGLE-TARGET BOXES.

      RECALL WITH BODY EVIDENCE
      - First find obvious body-backed targets.
      - Then do one missed-target check for secondary, distant, off-center,
        foreground, background, and edge targets.
      - A small or distant target can be valid when its connected body or
        exterior structure remains separable and tight-boxable.
      - Burned or destroyed military equipment can be valid when a connected
        wreck body, chassis, hull, vehicle mass, or outline remains visible.
      - Do not stop after the largest, closest, most central, or most damaged
        target when another body-backed target is clearly visible.
      - Never invent targets to match an expected count.

      FINAL BOX AUDIT
      Before final output, audit every proposed detection:
      - Can I name the visible body evidence inside this box?
      - Does the box cover one target body or exterior structure, not a larger
        region where targets may exist?
      - Is most of the box occupied by the accepted target body or structure?
      - Could I tighten the box substantially without cutting off the accepted
        body?
      - Would this detection still make sense if surrounding terrain, road,
        smoke, fire, debris, shadows, and neighboring bodies were removed?

      If any audit answer fails or is uncertain, reject that detection.

      ROW, GROUP, AND CROWD FAIL-CLOSED RULE
      In row-like, convoy-like, crowded, or patterned regions:
      - Do not enumerate every repeated small shape.
      - Do not output one broad box around the row, convoy, group, or cluster.
      - Output only objects whose own connected body is visually separable from
        neighbors and can be boxed tightly.
      - If separate bodies are not clear, output no detection for that region.

      BUILDING TARGET SELECTION
      - Detect only distinct exterior building bodies or distinct collapsed
        exterior structural remains.
      - Do not split one continuous building, attached wing, shared facade,
        side wall, fire/smoke region, rubble edge, or debris field into
        multiple boxes.
      - Do not box smoke, flame, facade texture, shadow, debris, interior rooms,
        cubicles, furniture, interior walls, ceiling tiles, or adjacent context
        as a building.
      - If the image is primarily indoors and no visible exterior building
        structure or collapsed exterior structural remain is present, return no
        building detections.

      MILITARY-EQUIPMENT TARGET SELECTION
      - Detect only clearly visible distinct equipment bodies or wreck bodies.
      - Burned or destroyed equipment may still count when a connected body,
        hull, chassis, vehicle mass, or wreck outline is visible.
      - Do not infer equipment from tracks, lanes, shadows, repeated marks,
        smoke, dust, flame, debris, or ambiguous background fragments.
      - Do not output a long row, convoy region, broad group box, or scene
        region as one equipment detection.

      TARGET-TYPE SPECIFIC DETECTION GUIDANCE
      {detection_guidance}

      BOXING RULE
      - Box only the visible connected man-made body or exterior structure of
        each accepted target.
      - Use fire, smoke, dust, or debris only to help locate a target, not to
        define the box boundary.
      - Keep the box tight on the visible connected target body that remains.
      - Do not include smoke plume, flame column, muzzle flash, debris field,
        rail bed, road, shadow, empty ground, or background context.
      - Do not draw a box whose main purpose is to cover an area that may
        contain targets.

      OUTPUT DISCIPLINE
      - Produce exactly one bounding box per accepted target.
      - Return only the doctrinal target_type category.
      - Do not infer a finer subtype such as locomotive, train car, truck, or
        artillery piece.
      - Return valid JSON only.

      BOUNDING BOX FORMAT
      - Format: {bbox_format}
      - Coordinate scale: {bbox_scale}

      OUTPUT SCHEMA
      {
        "detections": [
          {
            "target_type": string,
            "bbox": {bbox_format}
          }
        ]
      }
