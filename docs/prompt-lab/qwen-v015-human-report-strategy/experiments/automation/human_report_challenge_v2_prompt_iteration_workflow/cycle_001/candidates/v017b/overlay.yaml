overlay_id: "qwen-1.2-v017b-detect-single-target-box-span-self-filter"
overlay_type: "experiment"
model_line: "qwen3-vl:8b-instruct"
description: >
  Qwen 1.2 v017b detect-only prompt candidate for human_report_challenge_v2.
  This prompt-only experiment keeps the v017a accept/maybe/reject interface but
  adds a final single-target box-span audit so a broad region containing target
  evidence cannot be accepted as one detection.
overrides:
  prompts:
    detect_objects: |
      Perform a VISUAL-ONLY object detection.

      TASK
      Detect targets whose doctrinal target_type is one of:
      {categories}

      OUTPUT CONTRACT
      Return valid JSON only. If no valid target is visible, return:
      {"detections": []}

      PROMPT METHOD: DISCOVER, FILTER, THEN BOX
      Work silently in three stages before final JSON:

      1. DISCOVER
      Look for visible target candidates across the whole image, including
      secondary, distant, foreground, background, and off-center locations.
      Candidate discovery may notice clusters, rows, damage, smoke, fire, or
      debris, but those context clues are not final detections.

      2. FILTER
      A candidate may become final only when it is one distinct visible target
      body: one separable equipment body, wreck body, or exterior building
      structure.

      Keep a candidate out of final JSON when it is merely:
      - a row, convoy, group, cluster, or scene region
      - a broad area that contains one or more possible targets somewhere
      - smoke, flame, dust, debris, shadow, road, rail bed, terrain, rubble, or
        background texture
      - a repeated small mark, fragment, pattern element, or adjacent context
      - an uncertain target whose individual body cannot be isolated

      3. BOX
      Draw a final box only after the single target body is accepted. The box
      must be tight to that one accepted body or exterior structure.

      FINAL JSON MAY INCLUDE ONLY FILTERED SINGLE-TARGET BOXES.
      Never output a candidate just because target evidence exists somewhere
      inside a larger region.

      SINGLE-TARGET BOX-SPAN AUDIT
      Before final output, audit every proposed detection:
      - Does this box describe one target body, not an area where targets may
        exist?
      - Would the box still make sense if all surrounding road, terrain, smoke,
        fire, debris, shadows, and neighboring bodies were removed?
      - Does the box avoid spanning multiple possible targets, a row, a group,
        or a scene-level region?
      - Is most of the box occupied by the accepted target body or exterior
        structure, rather than empty/context area?
      - Could I tighten the box substantially without cutting off the accepted
        target body?

      If any audit answer fails or is uncertain, reject that detection. Do not
      replace it with a broad proxy box.

      BODY-BACKED RECALL
      - First find the obvious body-backed targets.
      - Then make one brief missed-target check for secondary, distant,
        off-center, foreground, and background targets whose own body remains
        separable and tight-boxable.
      - Do not stop after the largest, closest, most central, or most damaged
        target when another body-backed target is clearly visible.
      - A small or distant target can be valid when its individual body or
        exterior structure is still separable and tight-boxable.
      - A burned or destroyed equipment target can be valid when a connected
        wreck body, chassis, hull, vehicle mass, or outline remains visible.
      - If a target cannot be boxed as one body, omit it rather than using a
        larger group box.

      ROW, GROUP, AND CROWD FAIL-CLOSED RULE
      In row-like, convoy-like, crowded, or patterned regions:
      - Do not enumerate every repeated small shape.
      - Do not output one broad box around the row, convoy, group, or cluster.
      - Output only objects whose own connected body is visually separable from
        neighbors and can be boxed tightly.
      - If separate bodies are not clear, output no detection for that region.

      BUILDING TARGET SELECTION
      - Detect only distinct exterior building bodies or distinct collapsed
        exterior structural remains.
      - Do not split one continuous building, attached wing, shared facade,
        side wall, fire/smoke region, rubble edge, or debris field into
        multiple boxes.
      - Do not box smoke, flame, facade texture, shadow, debris, interior
        rooms, cubicles, furniture, interior walls, ceiling tiles, or adjacent
        context as a building.
      - If the image is primarily indoors and no visible exterior building
        structure or collapsed exterior structural remain is present, return
        no building detections.

      MILITARY-EQUIPMENT TARGET SELECTION
      - Detect only clearly visible distinct equipment bodies or wreck bodies.
      - Burned or destroyed equipment may still count when a connected body,
        hull, chassis, vehicle mass, or wreck outline is visible.
      - Do not infer equipment from tracks, lanes, shadows, repeated marks,
        smoke, dust, flame, debris, or ambiguous background fragments.
      - Do not output a long row, convoy region, broad group box, or scene
        region as one equipment detection.

      TARGET-TYPE SPECIFIC DETECTION GUIDANCE
      {detection_guidance}

      BOXING RULE
      - Box only the visible connected man-made body or exterior structure of
        each accepted target.
      - Use fire, smoke, dust, or debris only to help locate a target, not to
        define the box boundary.
      - Keep the box tight on the visible connected target body that remains.
      - Do not include smoke plume, flame column, muzzle flash, debris field,
        rail bed, road, shadow, empty ground, or background context.
      - Do not draw a box whose main purpose is to cover an area that may
        contain targets. Draw only boxes around accepted individual targets.

      OUTPUT DISCIPLINE
      - Produce exactly one bounding box per accepted target.
      - Return only the doctrinal target_type category.
      - Do not infer a finer subtype such as locomotive, train car, truck, or
        artillery piece.
      - Never invent targets to match an expected count.
      - Return valid JSON only.

      BOUNDING BOX FORMAT
      - Format: {bbox_format}
      - Coordinate scale: {bbox_scale}

      OUTPUT SCHEMA
      {
        "detections": [
          {
            "target_type": string,
            "bbox": {bbox_format}
          }
        ]
      }
