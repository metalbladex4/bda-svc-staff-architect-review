overlay_id: qwen-1.2-v020g_self_consistency_veto
overlay_type: experiment
model_line: qwen3-vl:8b-instruct
description: Preserve v020c behavior while vetoing label/logic contradictions and tiling-style subdivisions that caused v020f false positives.
generated_from:
- v020c_v019c_extra_box_audit
overrides:
  prompts:
    detect_objects: |
      Perform a VISUAL-ONLY object detection.

      TASK
      Detect targets whose doctrinal target_type is one of:
      {categories}

      Calibration from v020 debugging: v020c is the incumbent balance. Later attempts failed by disturbing dense row recovery and by subdividing roads/buildings into many small boxes. Keep v020c behavior; add only a final self-consistency veto.

      CONTEXT SHADOW REVERSAL
      Use context to search, then mentally remove context to decide.

      1. Find possible targets across the full image.
      2. For each candidate, imagine removing smoke, dust, flame, shadow, road, debris, row alignment, blast texture, tracks, terrain marks, and repeated spacing.
      3. Keep the candidate only if a target body, wreck body, or exterior structure remains visible enough to draw a tight box after those context cues are removed.
      4. If the candidate disappears when context is ignored, reject it.
      5. If a broad box contains several possible targets, split only when distinct bodies are visible; otherwise reject the broad box.

      GOOD FINAL BOX
      - one connected target body, wreck body, or exterior building structure
      - tight enough that the target occupies most of the box
      - not a proxy for damage effects, row position, nearby roads, repeated spacing, or debris

      BAD FINAL BOX
      - context-only cue
      - group, row, convoy, cluster, or scene region
      - duplicate fragment of one connected body
      - interior/facade/debris subsection of one continuous building
      - extra neighboring box whose distinct body boundary is not visible
      - a tile, slot, grid cell, road segment, facade segment, or repeated equal-size subdivision

      EXTRA-BOX AUDIT
      Before output, silently inspect every detection that sits near another detection or near a strong context cue. Remove it unless it has its own visible body center and at least one visible body edge or exterior-structure boundary. If two boxes describe the same connected body or the same continuous exterior building, keep only the tighter whole-body box.

      SELF-CONSISTENCY VETO
      Before output, check each kept detection against its target_type.
      - If you would describe a military_equipment detection as civilian, non-military, a building, a utility structure, not visible, or no equipment present, remove it.
      - If you would describe a building detection as only debris, interior rubble, a facade fragment, a road/ground patch, or a vehicle, remove it.
      - Do not create a sequence of equal-size boxes merely to cover unboxed space. Only output boxes anchored to visible target bodies.

      FINAL BALANCE
      Keep v020c recall behavior: small, damaged, crowded, or partly obscured targets are valid when their own target body remains visible after context is removed. The audit removes extras; it should not remove a true separable target body.

      TARGET-TYPE SPECIFIC DETECTION GUIDANCE
      {detection_guidance}

      BOUNDING BOX FORMAT
      - Format: {bbox_format}
      - Coordinate scale: {bbox_scale}

      OUTPUT
      Return valid JSON only.
      Return a JSON object with a top-level detections field.
      If no valid target is visible, return {"detections": []}.

      OUTPUT SCHEMA
      {
        "detections": [
          {
            "target_type": string,
            "bbox": {bbox_format}
          }
        ]
      }
  runtime:
    notes: Prompt text is applied by scratch upstream config replacement; no runtime adoption.
