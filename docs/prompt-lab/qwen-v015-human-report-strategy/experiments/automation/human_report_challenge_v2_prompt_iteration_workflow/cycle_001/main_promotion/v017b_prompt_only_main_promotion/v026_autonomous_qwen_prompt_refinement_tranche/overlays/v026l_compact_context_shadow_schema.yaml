      \ is not visible\n\nBefore output, silently audit boxes near another detection\
      \ or strong context cue. Keep the box only if it still has its own visible body\
      \ center and at least one visible body edge or exterior-structure boundary after\
      \ context cues are ignored.\n\nTARGET-TYPE SPECIFIC DETECTION GUIDANCE\n{detection_guidance}\n\
      \nBOUNDING BOX FORMAT\n- Format: {bbox_format}\n- Coordinate scale: {bbox_scale}\n\
      \nOUTPUT\nReturn valid JSON only.\nReturn a JSON object with a top-level detections\
