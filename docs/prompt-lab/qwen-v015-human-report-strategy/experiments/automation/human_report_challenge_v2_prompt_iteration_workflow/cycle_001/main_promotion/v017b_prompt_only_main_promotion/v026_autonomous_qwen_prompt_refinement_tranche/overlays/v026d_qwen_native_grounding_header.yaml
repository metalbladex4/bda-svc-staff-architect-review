overrides:
  prompts:
    detect_objects: "Perform a VISUAL-ONLY object detection.\n      Detect every visible\
      \ valid target and output one JSON bbox per distinct visible target body.\n\n\
      TASK\nDetect targets whose doctrinal target_type is one of:\n{categories}\n\n\
      Calibration from prior runs: broad recall additions raised false positives.\
      \ Return to the v019c context-shadow balance and improve only the final cleanup\
      \ of extra boxes.\n\nCONTEXT SHADOW REVERSAL\nUse context to search, then mentally\
      \ remove context to decide.\n\n1. Find possible targets across the full image.\n\
      2. For each candidate, imagine removing smoke, dust, flame, shadow, road, debris,\
      \ row alignment, blast texture, tracks, terrain marks, and repeated spacing.\n\
      3. Keep the candidate only if a target body, wreck body, or exterior structure\
      \ remains visible enough to draw a tight box after those context cues are removed.\n\
      4. If the candidate disappears when context is ignored, reject it.\n5. If a\
      \ broad box contains several possible targets, split only when distinct bodies\
      \ are visible; otherwise reject the broad box.\n\nGOOD FINAL BOX\n- one connected\
      \ target body, wreck body, or exterior building structure\n- tight enough that\
      \ the target occupies most of the box\n- not a proxy for damage effects, row\
      \ position, nearby roads, repeated spacing, or debris\n\nBAD FINAL BOX\n- context-only\
      \ cue\n- group, row, convoy, cluster, or scene region\n- duplicate fragment\
      \ of one connected body\n- interior/facade/debris subsection of one continuous\
      \ building\n- extra neighboring box whose distinct body boundary is not visible\n\
      \nEXTRA-BOX AUDIT\nBefore output, silently inspect every detection that sits\
      \ near another detection or near a strong context cue. Remove it unless it has\
      \ its own visible body center and at least one visible body edge or exterior-structure\
      \ boundary. If two boxes describe the same connected body or the same continuous\
      \ exterior building, keep only the tighter whole-body box.\n\nFINAL BALANCE\n\
      Keep v019c recall behavior: small, damaged, crowded, or partly obscured targets\
      \ are valid when their own target body remains visible after context is removed.\
      \ The audit removes extras; it should not remove a true separable target body.\n\
      \nTARGET-TYPE SPECIFIC DETECTION GUIDANCE\n{detection_guidance}\n\nBOUNDING\
      \ BOX FORMAT\n- Format: {bbox_format}\n- Coordinate scale: {bbox_scale}\n\n\
      OUTPUT\nReturn valid JSON only.\nReturn a JSON object with a top-level detections\
      \ field.\nIf no valid target is visible, return {\"detections\": []}.\n\nOUTPUT\
      \ SCHEMA\n{\n  \"detections\": [\n    {\n      \"target_type\": string,\n  \
      \    \"bbox\": {bbox_format}\n    }\n  ]\n}\n"
  runtime:
    notes: Applied only inside upstream/main scratch config; no product adoption.
