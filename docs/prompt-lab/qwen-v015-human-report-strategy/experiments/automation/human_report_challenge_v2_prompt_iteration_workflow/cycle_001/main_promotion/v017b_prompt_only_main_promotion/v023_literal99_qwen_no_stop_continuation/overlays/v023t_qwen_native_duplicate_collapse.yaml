candidate_id: v023t_qwen_native_duplicate_collapse
title: v023t qwen native duplicate collapse
generated_from:
  - v023s_qwen_native_conservative_json
  - v023s_error_map
hypothesis: >
  v023s improved recall but over-produced extras, especially duplicate-like
  detections in sparse scenes and dense rows. Add a compact final collapse
  audit that keeps one box per visible body and removes extra boxes for parts,
  shadows, neighboring context, or alternate views of the same target.
overrides:
  prompts:
    detect_objects: |
      Detect every visible target whose doctrinal target_type is one of:
      {categories}

      Return JSON bounding boxes only. Use one detection per distinct visible target body, wreck body, or exterior building structure.

      Include a target when its own visible body, wreck mass, hull/chassis/roofline, wheel/track contact, silhouette, or exterior wall/roof boundary is visible enough to box tightly.

      Exclude boxes for smoke, dust, flame, shadows, roads, terrain, blast marks, debris-only patches, row spacing, empty gaps, broad groups, duplicate fragments, and context without a visible target body.

      In crowded rows, convoys, or clusters, output one tight box for each distinct visible target body. Do not output a broad row or cluster box.

      FINAL COLLAPSE AUDIT
      Before output, silently collapse extras:
      - if several boxes describe the same visible body, keep the single tightest whole-body box
      - if a sparse scene has one visible target body, output one box, not multiple nearby guesses
      - if a box covers only a part, shadow, dust patch, debris patch, or context beside a stronger whole-body box, remove it
      - in dense rows, keep separable bodies, but remove boxes that sit in gaps or repeat a neighbor's body

      TARGET-TYPE SPECIFIC DETECTION GUIDANCE
      {detection_guidance}

      BOUNDING BOX FORMAT
      - Format: {bbox_format}
      - Coordinate scale: {bbox_scale}

      OUTPUT
      Return valid JSON only.
      Return a JSON object with a top-level detections field.
      If no valid target is visible, return {"detections": []}.

      OUTPUT SCHEMA
      {
        "detections": [
          {
            "target_type": string,
            "bbox": {bbox_format}
          }
        ]
      }
notes:
  prompt_surface: detect_objects only
  no_stop_contract: continue until literal target, user interrupt, or usage exhaustion
