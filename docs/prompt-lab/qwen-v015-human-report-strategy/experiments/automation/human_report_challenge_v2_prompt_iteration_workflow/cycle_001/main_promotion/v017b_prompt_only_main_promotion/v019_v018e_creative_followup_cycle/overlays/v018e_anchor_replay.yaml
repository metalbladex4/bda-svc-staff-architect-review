      \ and wreck bodies only. Burned equipment can\ncount when a connected body,\
      \ chassis, hull, vehicle mass, or wreck outline is\nvisible. Do not infer equipment\
      \ from tracks, dust, smoke, repeated marks, or\nambiguous fragments.\n\nOUTPUT\
