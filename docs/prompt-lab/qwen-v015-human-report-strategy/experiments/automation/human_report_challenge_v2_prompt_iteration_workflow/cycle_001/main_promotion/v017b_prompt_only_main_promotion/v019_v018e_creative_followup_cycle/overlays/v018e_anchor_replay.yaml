      \ occupied by the target\n- can stand alone if nearby smoke, dust, terrain,\
      \ roads, shadows, and\n  neighboring bodies are ignored\n- include small or\
      \ distant targets when their body center and edges remain\n  visible enough\
      \ to localize\n\nBad final boxes:\n- cover a row, convoy, cluster, formation,\
      \ broad damaged area, or scene region\n- mainly cover smoke, flame, dust, debris,\
      \ blast effects, shadow, road, rail\n  bed, terrain, repeated marks, or background\
      \ texture\n- split one connected target body or one continuous building into\
      \ fragments\n- use evenly spaced placeholders where bodies are not individually\
      \ visible\n- box adjacent context because it is near a real target\n\nDETECTION\
      \ PROCESS\n1. Find obvious targets first.\n2. Re-scan for secondary, distant,\
      \ edge, foreground, and background targets.\n3. In row-like or dense scenes,\
      \ anchor each possible box on visible body\n   center, ground contact, hull/chassis/wreck\
      \ mass, or exterior structure, not\n   on the top edge of smoke, dust, or row\
      \ alignment.\n4. Remove any candidate that is not a good final box.\n5. Output\
      \ one box per accepted target.\n\nTARGET-TYPE SPECIFIC DETECTION GUIDANCE\n\
      {detection_guidance}\n\nBUILDINGS\nDetect distinct exterior building bodies\
      \ only. Do not box interior rooms,\nfurniture, facade texture, smoke, flame,\
      \ debris, or one attached subsection as\na separate building. Do not split a\
