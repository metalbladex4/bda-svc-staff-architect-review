      \ If two boxes describe the same connected body or the same continuous exterior\
      \ building, keep only the tighter whole-body box.\n\nFINAL BALANCE\nKeep v019c\
      \ recall behavior: small, damaged, crowded, or partly obscured targets are valid\
      \ when their own target body remains visible after context is removed. The audit\
      \ removes extras; it should not remove a true separable target body.\n\nTARGET-TYPE\
      \ SPECIFIC DETECTION GUIDANCE\n{detection_guidance}\n\nBOUNDING BOX FORMAT\n\
      - Format: {bbox_format}\n- Coordinate scale: {bbox_scale}\n\nOUTPUT\nReturn\
