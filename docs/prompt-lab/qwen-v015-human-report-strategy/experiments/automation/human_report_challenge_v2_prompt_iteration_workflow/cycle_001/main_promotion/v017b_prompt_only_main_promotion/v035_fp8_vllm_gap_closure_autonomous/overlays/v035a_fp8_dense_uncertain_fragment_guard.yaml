      \ a target body, wreck body, or exterior structure remains visible enough to\
      \ draw a tight box after those context cues are removed.\n4. If the candidate\
      \ disappears when context is ignored, reject it.\n5. If a broad box contains\
      \ several possible targets, split only when distinct bodies are visible; otherwise\
      \ reject the broad box.\n\nGOOD FINAL BOX\n- one connected target body, wreck\
      \ body, or exterior building structure\n- tight enough that the target occupies\
      \ most of the box\n- not a proxy for damage effects, row position, nearby roads,\
      \ repeated spacing, or debris\n\nBAD FINAL BOX\n- context-only cue\n- group,\
      \ row, convoy, cluster, or scene region\n- duplicate fragment of one connected\
      \ body\n- interior/facade/debris subsection of one continuous building\n- extra\
      \ neighboring box whose distinct body boundary is not visible\n- broad context\
      \ or scene boxes whose strongest support is a row, blast area, road, debris\
